<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rohan Mehra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['Share Tech Mono', 'monospace'],
                        hacker: ['Share Tech Mono', 'monospace'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; }

        body {
            background: #000;
            font-family: 'Inter', system-ui, sans-serif;
            color: #888;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Matrix canvas ── */
        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.18;
        }

        /* ── Vignette over canvas ── */
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 1;
            background:
                radial-gradient(ellipse 70% 70% at 50% 50%, transparent 30%, #000 100%);
            pointer-events: none;
        }

        /* ── Content ── */
        .content {
            position: relative;
            z-index: 2;
            max-width: 560px;
            margin: 0 auto;
            padding: 0 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* ── Name ── */
        .name {
            font-family: 'Share Tech Mono', monospace;
            font-size: clamp(3rem, 10vw, 5.5rem);
            font-weight: 400;
            letter-spacing: -0.02em;
            line-height: 1;
            color: #fff;
            margin: 0 0 0.15em 0;
            text-shadow: 0 0 40px rgba(255,255,255,0.08);
        }

        /* subtle scan-line flicker on name */
        .name span {
            display: inline-block;
            animation: flicker 8s ease-in-out infinite;
        }
        @keyframes flicker {
            0%,96%,100% { opacity: 1; }
            97% { opacity: 0.85; }
            98% { opacity: 1; }
            99% { opacity: 0.9; }
        }

        /* ── Divider ── */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #333 30%, #444 50%, #333 70%, transparent);
            margin: 2rem 0;
            transform-origin: left;
            animation: grow-line 1.2s cubic-bezier(0.4,0,0.2,1) 0.6s both;
        }
        @keyframes grow-line {
            from { transform: scaleX(0); opacity: 0; }
            to   { transform: scaleX(1); opacity: 1; }
        }

        /* ── Status ── */
        .status {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            color: #3a3a3a;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2.5rem;
            animation: fade-up 0.8s ease 0.3s both;
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 6px rgba(74,222,128,0.8);
            animation: pulse-dot 2.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,100% { box-shadow: 0 0 4px rgba(74,222,128,0.8); }
            50%      { box-shadow: 0 0 10px rgba(74,222,128,0.4); }
        }

        /* ── Email ── */
        .email-wrap {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            color: #555;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: fade-up 0.8s ease 0.8s both;
            cursor: pointer;
            width: fit-content;
            position: relative;
            transition: color 0.25s;
        }
        .email-wrap::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0;
            height: 1px;
            width: 0;
            background: #888;
            transition: width 0.35s ease;
        }
        .email-wrap:hover { color: #bbb; }
        .email-wrap:hover::after { width: 100%; }

        .email-icon {
            width: 14px; height: 14px;
            stroke: #444;
            flex-shrink: 0;
            transition: stroke 0.25s;
        }
        .email-wrap:hover .email-icon { stroke: #888; }

        /* ── Footer ── */
        .footer {
            position: absolute;
            bottom: 2.5rem;
            left: 2rem; right: 2rem;
            max-width: 560px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            color: #2a2a2a;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        /* ── Animations ── */
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fade-in {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .animate-name {
            animation: fade-up 1s cubic-bezier(0.2,0,0.2,1) 0.1s both;
        }

        ::selection { background: #ffffff15; color: #fff; }
    </style>
</head>
<body>

    <!-- Matrix rain canvas -->
    <canvas id="matrix-canvas"></canvas>

    <!-- Vignette -->
    <div class="vignette"></div>

    <!-- Main content -->
    <div class="content">

        <div class="status">
            <span class="status-dot"></span>
            available
        </div>

        <h1 class="name animate-name">
            <span>ROHAN</span><br>
            <span style="animation-delay:0.4s">MEHRA</span>
        </h1>

        <div class="divider"></div>

        <div class="email-wrap" id="email-display" title="Send email">
            <svg class="email-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <span id="email-text"></span>
        </div>

    </div>

    <!-- Footer pinned bottom -->
    <div style="position:fixed;bottom:2rem;left:0;right:0;z-index:2;padding:0 2rem;">
        <div style="max-width:560px;margin:0 auto;display:flex;justify-content:space-between;">
            <span class="footer-text">© 2026</span>
            <span class="footer-text">rohanvmehra.com</span>
        </div>
    </div>

    <script>
    // ── Email obfuscation ──────────────────────────────────────
    (function() {
        const p = ['rohanvmehra', 'outlook', 'com'];
        // Display with [at] so scrapers can't read it as an email address
        const display = p[0] + '[at]' + p[1] + '.' + p[2];
        const el = document.getElementById('email-text');
        el.textContent = display;
        document.getElementById('email-display').addEventListener('click', function() {
            window.location.href = 'mailto:' + p[0] + '@' + p[1] + '.' + p[2];
        });
    })();

    // ── Matrix rain ────────────────────────────────────────────
    (function() {
        const canvas = document.getElementById('matrix-canvas');
        const ctx    = canvas.getContext('2d');

        // Characters: katakana + latin + digits
        const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

        const FONT_SIZE = 13;
        let cols, drops;

        function resize() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
            cols  = Math.floor(canvas.width / FONT_SIZE);
            drops = Array.from({ length: cols }, () => Math.random() * -100);
        }

        function draw() {
            // Fade trail
            ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = FONT_SIZE + 'px "Share Tech Mono", monospace';

            for (let i = 0; i < drops.length; i++) {
                const ch = chars[Math.floor(Math.random() * chars.length)];
                const y  = drops[i] * FONT_SIZE;

                // Head: bright white
                const headBrightness = Math.random();
                if (headBrightness > 0.5) {
                    ctx.fillStyle = '#ffffff';
                } else {
                    // Body: shades of grey
                    const grey = Math.floor(80 + Math.random() * 100);
                    ctx.fillStyle = `rgb(${grey},${grey},${grey})`;
                }

                ctx.fillText(ch, i * FONT_SIZE, y);

                // Reset drop randomly after it passes bottom
                if (y > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i] += 0.5;
            }
        }

        resize();
        window.addEventListener('resize', resize);
        setInterval(draw, 40); // ~25fps for subtle effect
    })();
    </script>

</body>
</html>
