<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rohan Mehra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        bg: '#0a0a0a',
                        surface: '#111111',
                        border: '#1f1f1f',
                        muted: '#3a3a3a',
                        subtle: '#6b6b6b',
                        body: '#a8a8a8',
                        heading: '#f0f0f0',
                        accent: '#e8d5b0',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.8s ease forwards',
                        'fade-up': 'fadeUp 0.8s ease forwards',
                        'cursor-blink': 'blink 1.2s step-end infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        fadeUp: {
                            '0%': { opacity: '0', transform: 'translateY(16px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        blink: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0' },
                        },
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { -webkit-font-smoothing: antialiased; }
        body { background-color: #0a0a0a; }

        .fade-delay-1 { animation-delay: 0.1s; opacity: 0; }
        .fade-delay-2 { animation-delay: 0.25s; opacity: 0; }
        .fade-delay-3 { animation-delay: 0.4s; opacity: 0; }
        .fade-delay-4 { animation-delay: 0.55s; opacity: 0; }
        .fade-delay-5 { animation-delay: 0.7s; opacity: 0; }

        .noise {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 128px 128px;
        }

        .glow-line {
            background: linear-gradient(90deg, transparent, #e8d5b020, transparent);
        }

        a { transition: color 0.2s ease; }

        .email-link:hover { color: #e8d5b0; }

        ::selection {
            background: #e8d5b030;
            color: #f0f0f0;
        }
    </style>
</head>
<body class="bg-bg text-body font-sans min-h-screen">

    <!-- Noise texture overlay -->
    <div class="noise"></div>

    <!-- Main layout -->
    <div class="relative z-10 max-w-2xl mx-auto px-6 py-20 md:py-32">

        <!-- Header -->
        <header class="mb-20 animate-fade-up fade-delay-1">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-heading text-xl font-semibold tracking-tight">Rohan Mehra</h1>
                    <a
                        href="mailto:rohanvmehra@outlook.com"
                        class="email-link font-mono text-sm text-subtle mt-1 inline-block hover:text-accent transition-colors duration-200"
                    >rohanvmehra@outlook.com</a>
                </div>
                <!-- Status dot -->
                <div class="flex items-center gap-2 text-xs text-subtle font-mono">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-50"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    available
                </div>
            </div>

            <!-- Divider -->
            <div class="mt-8 h-px glow-line"></div>
        </header>

        <!-- Hero -->
        <section class="mb-16 animate-fade-up fade-delay-2">
            <p class="text-heading text-3xl md:text-4xl font-light leading-snug tracking-tight">
                Hi, I'm Rohan<span class="text-accent animate-cursor-blink">_</span>
            </p>
        </section>

        <!-- Divider -->
        <div class="mb-16 h-px bg-border animate-fade-in fade-delay-3"></div>

        <!-- Contact section -->
        <section class="animate-fade-up fade-delay-4">
            <p class="text-xs font-mono text-muted uppercase tracking-widest mb-4">Contact</p>
            <a
                href="mailto:rohanvmehra@outlook.com"
                class="email-link group flex items-center gap-3 text-body hover:text-accent transition-colors duration-200"
            >
                <svg class="w-4 h-4 text-muted group-hover:text-accent transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
                <span class="font-mono text-sm">rohanvmehra@outlook.com</span>
            </a>
        </section>

        <!-- Footer -->
        <footer class="mt-32 animate-fade-in fade-delay-5">
            <div class="h-px bg-border mb-8"></div>
            <p class="text-xs font-mono text-muted">
                © 2026 Rohan Mehra
            </p>
        </footer>

    </div>

</body>
</html>
